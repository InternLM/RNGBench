<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RNG-Bench Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

<header class="top">
  <div class="brand">
    <span class="brand-mark">RNG<span class="brand-slash">/</span>Bench</span>
    <span class="brand-sub">Playground — watch a model play, live</span>
  </div>
  <nav class="gameswitch" id="gameswitch"><!-- game tabs injected --></nav>
</header>

<main class="layout">
  <!-- LEFT: the screen -->
  <section class="stage">
    <p class="game-desc" id="game-desc"></p>

    <div class="screen">
      <img id="board" alt="game board">
      <div class="screen-empty" id="screen-empty">Configure a model and press <b>New game</b>.</div>
      <div class="screen-tag" id="phase">idle</div>
    </div>
    <p class="info-line" id="info-line"></p>

    <div class="controls">
      <button class="btn" id="btn-new">New game</button>
      <button class="btn" id="btn-step" disabled>Step</button>
      <button class="btn btn-primary" id="btn-auto" disabled>Auto-play</button>
      <div class="manual" id="manual"><!-- manual action buttons injected --></div>
    </div>

    <details class="card" id="setup" open>
      <summary>Game setup</summary>
      <div class="form" id="game-config"><!-- per-game fields injected --></div>
    </details>
  </section>

  <!-- RIGHT: controls + log -->
  <aside class="side">
    <div class="chips" id="chips"><!-- stat chips injected --></div>

    <details class="card" open>
      <summary>Model endpoint</summary>
      <div class="form form-col">
        <label>Server URL <span class="hint">OpenAI-compatible · proxied server-side</span>
          <input id="m-base" type="text" placeholder="https://api.openai.com/v1" spellcheck="false">
        </label>
        <label>API key <span class="hint">stays in your browser</span>
          <input id="m-key" type="password" placeholder="leave blank if not needed" spellcheck="false">
        </label>
        <label>Model
          <input id="m-model" type="text" placeholder="gpt-4o-mini" spellcheck="false">
        </label>
        <div class="row">
          <label class="grow">temperature
            <input id="m-temp" type="number" step="0.1" min="0" max="2" value="0.7">
          </label>
          <label class="grow">max_tokens
            <input id="m-maxtok" type="number" min="16" value="2048">
          </label>
        </div>
      </div>
    </details>

    <div class="log-head">
      <span>Model interaction</span>
      <button class="btn btn-ghost btn-sm" id="btn-clear">Clear</button>
    </div>
    <div class="log" id="log"></div>
  </aside>
</main>

<script src="static/app.js"></script>
</body>
</html>
